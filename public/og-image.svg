<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <radialGradient id="ogBg" cx="50%" cy="0%" r="80%" fx="50%" fy="0%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="60%" stop-color="#080808"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="ogMark" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#c13584"/>
    </linearGradient>
    <linearGradient id="ogTextGrad" x1="0" y1="0" x2="800" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="ogADN" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#c13584"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <filter id="ogGlow"><feGaussianBlur stdDeviation="6"/></filter>
  </defs>

  <!-- Fondo -->
  <rect width="1200" height="630" fill="url(#ogBg)"/>

  <!-- Halo glow detrás del mark -->
  <circle cx="600" cy="240" r="120" fill="#7c3aed" opacity="0.25" filter="url(#ogGlow)"/>

  <!-- Mark grande, centrado -->
  <g transform="translate(490 130)">
    <rect x="0" y="0" width="220" height="220" rx="58" fill="url(#ogMark)"/>
    <g stroke="#ffffff" stroke-width="9" stroke-linecap="round" fill="none">
      <path d="M70 32 C 138 68, 70 104, 138 140 C 70 176, 138 200, 138 200"/>
      <path d="M150 32 C 82 68, 150 104, 82 140 C 150 176, 82 200, 82 200"/>
    </g>
    <g stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.85">
      <line x1="84" y1="50" x2="136" y2="50"/>
      <line x1="74" y1="86" x2="146" y2="86"/>
      <line x1="84" y1="122" x2="136" y2="122"/>
      <line x1="74" y1="158" x2="146" y2="158"/>
    </g>
  </g>

  <!-- Wordmark -->
  <g text-anchor="middle">
    <text x="600" y="450"
      font-family="-apple-system, 'SF Pro Display', 'Inter', system-ui, sans-serif"
      font-weight="900"
      font-size="96"
      letter-spacing="-3">
      <tspan fill="url(#ogTextGrad)">Viral</tspan><tspan fill="url(#ogADN)">ADN</tspan>
    </text>
    <text x="600" y="510"
      font-family="-apple-system, 'SF Pro Display', 'Inter', system-ui, sans-serif"
      font-weight="500"
      font-size="28"
      letter-spacing="0"
      fill="#a78bfa"
      opacity="0.9">
      Descifra el ADN del contenido viral
    </text>
    <text x="600" y="560"
      font-family="-apple-system, 'SF Pro Display', 'Inter', system-ui, sans-serif"
      font-weight="500"
      font-size="20"
      fill="#666">
      YouTube · TikTok · Instagram
    </text>
  </g>
</svg>
